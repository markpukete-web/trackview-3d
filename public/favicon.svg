<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- We clip the 2D map to exactly a 28x28 square -->
    <clipPath id="tile-clip">
      <rect x="0" y="0" width="28" height="28"/>
    </clipPath>
    
    <!-- The actual 2D flat map of a racecourse corner, which will be folded into 3D -->
    <g id="map-tile">
      <!-- Turf Base Ground -->
      <rect x="0" y="0" width="28" height="28" fill="#22c55e"/>
      
      <!-- Racing Track curving through the corner of the tile -->
      <path d="M -12 18 A 24 24 0 0 0 18 -12" fill="none" stroke="#d97706" stroke-width="8"/>
      <path d="M -12 18 A 24 24 0 0 0 18 -12" fill="none" stroke="#fcd34d" stroke-width="6"/>
      <path d="M -12 18 A 24 24 0 0 0 18 -12" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="1 1"/>
      
      <!-- Architectural layout: Grandstands next to the track -->
      <!-- Building Shadow -->
      <rect x="14" y="14" width="12" height="12" fill="none" stroke="#15803d" stroke-width="1"/>
      <!-- Grandstand Roof Base -->
      <rect x="16" y="16" width="9" height="9" rx="1" fill="#f8fafc"/>
      <!-- Seating tiers facing the track -->
      <rect x="16" y="16" width="3" height="9" fill="#cbd5e1"/>
      <line x1="17.5" y1="16" x2="17.5" y2="25" stroke="#94a3b8" stroke-width="0.5"/>
      <line x1="19" y1="16" x2="19" y2="25" stroke="#e2e8f0" stroke-width="0.5"/>
      <rect x="16" y="16" width="9" height="3" fill="#cbd5e1" transform="matrix(0 1 -1 0 25 16)"/> <!-- Corner seating detail if needed, or simply left solid -->
      
      <!-- Venue Trees / Flora scattered on the turf -->
      <circle cx="22" cy="6" r="1.5" fill="#166534"/>
      <circle cx="25" cy="10" r="1.5" fill="#166534"/>
      <circle cx="20" cy="11" r="1" fill="#166534"/>
      <circle cx="6" cy="22" r="1.5" fill="#166534"/>
      <circle cx="10" cy="26" r="1.5" fill="#166534"/>
      <circle cx="12" cy="21" r="1" fill="#166534"/>
      
      <!-- Tiny red "POI Marker" dot as referenced in the README's Interactive Maps -->
      <circle cx="10" cy="10" r="3" fill="#ef4444" opacity="0.3"/>
      <circle cx="10" cy="10" r="1.5" fill="#ef4444"/>
      <circle cx="10" cy="10" r="0.5" fill="#ffffff"/>
      <line x1="10" y1="10" x2="10" y2="13" stroke="#ef4444" stroke-width="0.5"/>
    </g>
  </defs>

  <!-- The 3D Layering of the Earth Slab representing a Photorealistic 3D Tile -->
  <!-- Layer 1: Topsoil / Turf Depth -->
  <!-- Left Side Face -->
  <polygon points="4,28 32,44 32,47 4,31" fill="#166534"/>
  <!-- Right Side Face -->
  <polygon points="32,44 60,28 60,31 32,47" fill="#14532d"/>
  
  <!-- Layer 2: Deep Earth / Dirt Crust -->
  <!-- Left Side Face -->
  <polygon points="4,31 32,47 32,56 4,40" fill="#78350f"/>
  <!-- Right Side Face -->
  <polygon points="32,47 60,31 60,40 32,56" fill="#451a03"/>

  <!-- Projected 2D Map -> Mapped perfectly onto the isometric top face of the tile -->
  <g transform="matrix(1, 0.5714, -1, 0.5714, 32, 12)" clip-path="url(#tile-clip)">
    <use href="#map-tile"/>
  </g>
  
  <!-- Top Highlight Edge for extreme crispness on dark backgrounds -->
  <polygon points="32,12 60,28 32,44 4,28" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
</svg>
