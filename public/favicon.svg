<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Track oval (racecourse shape) -->
  <ellipse cx="16" cy="15" rx="12" ry="9" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>
  <!-- 3D perspective lines from bottom -->
  <line x1="8" y1="22" x2="4" y2="30" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="24" x2="16" y2="30" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="22" x2="28" y2="30" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Location pin dot (centre of track) -->
  <circle cx="16" cy="15" r="3" fill="#0ea5e9"/>
</svg>
